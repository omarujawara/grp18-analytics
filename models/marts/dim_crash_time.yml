version: 2

models:
  - name: dim_crash_time
    description: >
      Crash time dimension built from staged MVC crash data.
      Contains one row per distinct crash time and includes hour and
      time-band attributes for time-of-day analysis.

    columns:
      - name: crash_time_key
        description: >
          Surrogate key for the crash time dimension.
        tests:
          - not_null
          - unique

      - name: crash_time
        description: >
          Distinct crash time value from the staged MVC crash data.
        tests:
          - not_null
          - unique

      - name: hour
        description: >
          Hour extracted from the crash time value.

      - name: time_band
        description: >
          Broad time-of-day bucket derived from the crash hour.