version: 2

models:
  - name: fact_mvc_crash
    description: >
      MVC_Crash fact table built from the 'stg_mvc_crashes' staging table. There are 5 
      dimension tables related to this fact table, including two conformed dimensions.

    columns:
      - name: fact_mvc_key
        description: Surrogate key for the fact table
        tests:
          - not_null
          - unique

      - name: collision_id
        description: Unique record code generated by system. Primary Key for Crash table.        
        tests:
          - not_null
          - unique

      - name: date_key
        description: Surrogate key 'dim_date' dimension table
        tests:
          - not_null
          - unique
      
      - name: geo_key
        description: Surrogate key for the 'dim_geography_bucket' dimension table
        tests:
          - not_null
          - unique
        
      - name: crash_time_key
        description: Surrogate key for the 'dim_crash_time' dimension table
        tests:
          - not_null
          - unique
      
      - name: factor_key
        description: Surrogate key for the 'dim_contributing_factor' dimension table
        tests:
          - not_null
          - unique
      
      - name: vehicle_type_key
        description: Surrogate key for the 'dim_vehicle_type' dimension table
        tests:
          - not_null
          - unique
      
      - name: number_of_persons_injured
        description: The number of persons injured
      
      - name: number_of_persons_killed
        description: The number of persons killed